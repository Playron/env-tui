name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ContactExtractor/ContactExtractor.sln

      - name: Build
        run: dotnet build ContactExtractor/ContactExtractor.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test ContactExtractor/ContactExtractor.sln
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results
